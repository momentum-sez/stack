# Standalone: kernel + PostgreSQL + observability
#
# Simplest deployment. The kernel connects to Mass services
# hosted by Momentum over HTTP.
#
# Usage:
#   docker compose --env-file ../../.env up -d

services:
  mez-api:
    image: ghcr.io/momentum-sez/mez-api:${MEZ_VERSION:-0.4.44}
    ports:
      - "${PORT:-8080}:8080"
    env_file: ../../.env
    environment:
      ZONE_CONFIG: /zone/zone.yaml
      OPERATIONS_DIR: /zone/operations
      DATABASE_URL: postgresql://mez:${POSTGRES_PASSWORD}@postgres:5432/mez
      MEZ_HOST: 0.0.0.0
      PORT: 8080
    volumes:
      - ../../zone.yaml:/zone/zone.yaml:ro
      - ../../operations:/zone/operations:ro
      - ../../lawpacks:/zone/lawpacks:ro
      - ../../corridors:/zone/corridors:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/liveness"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mez
      POSTGRES_USER: mez
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mez"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    profiles: [observability]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    profiles: [observability]
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "127.0.0.1:16686:16686"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    profiles: [observability]
    restart: unless-stopped

volumes:
  pgdata:
