  # ── Database (single instance, mez-api owns writes) ───────────────────────

  kernel-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mez
      POSTGRES_USER: mez
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - kernel-pgdata:/var/lib/postgresql/data
      - ./init-db-kernel.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mez"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - kernel-network

volumes:
  kernel-pgdata:

networks:
  kernel-network:
